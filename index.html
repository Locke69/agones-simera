<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Αγώνες Σήμερα</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f2;
    --muted: #888890;
    --dim: #55555e;
    --accent: #c8f04a;
    --accent-dim: rgba(200,240,74,0.12);
    --live: #ff5252;
    --live-dim: rgba(255,82,82,0.12);
    --blue: #4a9eff;
    --blue-dim: rgba(74,158,255,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 4rem;
  }
  header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .logo { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1.1; }
  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(200,240,74,0.25);
    padding: 6px 14px;
    border-radius: 99px;
    letter-spacing: 0.04em;
  }
  .filters {
    padding: 1.25rem 2rem;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .pill {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .pill:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .pill.active { background: var(--accent); color: #0e0e10; border-color: transparent; font-weight: 500; }
  .main { padding: 1.5rem 2rem; }
  .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    background: rgba(255,82,82,0.08);
    border: 1px solid rgba(255,82,82,0.2);
    border-radius: 12px;
    padding: 1.5rem;
    color: #ff8080;
    font-size: 14px;
    text-align: center;
  }
  .league-block { margin-bottom: 2rem; }
  .league-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .league-flag { font-size: 18px; }
  .league-name { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .league-count { margin-left: auto; font-size: 11px; color: var(--dim); font-family: 'DM Mono', monospace; }
  .match {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .match::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    border-radius: 14px 0 0 14px;
  }
  .match.live::before { background: var(--live); }
  .match.top-pick::before { background: var(--accent); }
  .match:hover { border-color: var(--border2); }
  .match-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .match-time { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .live-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--live); font-weight: 500; font-family: 'DM Mono', monospace; }
  .live-dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--live); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .match-teams { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .team-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--text); }
  .team-name.away { text-align: right; }
  .score-or-vs { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text); min-width: 60px; text-align: center; }
  .score-or-vs.vs { font-size: 11px; color: var(--dim); }
  .odds { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .odd {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
    cursor: pointer;
    background: var(--surface2);
    transition: all 0.15s;
    user-select: none;
  }
  .odd:hover { border-color: var(--border2); background: rgba(255,255,255,0.05); }
  .odd.best { border-color: rgba(200,240,74,0.3); background: var(--accent-dim); }
  .odd.selected { background: var(--accent); border-color: transparent; }
  .odd-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; display: block; margin-bottom: 3px; }
  .odd.selected .odd-label { color: #0e0e10; }
  .odd.best .odd-label { color: var(--accent); }
  .odd-val { font-size: 14px; font-weight: 600; color: var(--text); display: block; }
  .odd.selected .odd-val { color: #0e0e10; }
  .odd.best .odd-val { color: var(--accent); }
  .no-odds { font-size: 12px; color: var(--dim); font-family: 'DM Mono', monospace; text-align: center; padding: 4px 0; }

  /* Betslip */
  .betslip {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 300px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    z-index: 100;
    transition: transform 0.2s, opacity 0.2s;
  }
  .betslip-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .betslip-title { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text); }
  .betslip-count {
    background: var(--accent);
    color: #0e0e10;
    font-size: 11px;
    font-weight: 600;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
  }
  .betslip-body { padding: 10px 16px 14px; max-height: 220px; overflow-y: auto; }
  .betslip-empty { font-size: 12px; color: var(--dim); font-family: 'DM Mono', monospace; text-align: center; padding: 12px 0; }
  .slip-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .slip-item:last-child { border-bottom: none; }
  .slip-match { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .slip-pick { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 2px; }
  .slip-pct { font-size: 12px; color: var(--accent); font-family: 'DM Mono', monospace; float: right; margin-top: -16px; }
  .betslip-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
  .clear-btn { font-size: 11px; color: var(--dim); background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; text-decoration: underline; }
  .clear-btn:hover { color: var(--muted); }
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--dim); font-family: 'DM Mono', monospace; font-size: 13px; }

  @media (max-width: 600px) {
    header, .filters, .main { padding-left: 1rem; padding-right: 1rem; }
    .betslip { width: calc(100% - 2rem); right: 1rem; }
    .team-name { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Football · Odds Tracker</div>
    <h1>Αγώνες Σήμερα</h1>
  </div>
  <div class="date-badge" id="dateBadge">—</div>
</header>

<div class="filters" id="filters">
  <button class="pill active" onclick="filterLeague('all', this)">Όλα</button>
</div>

<div class="main" id="main">
  <div class="loading">
    <div class="spinner"></div>
    ΦΟΡΤΩΣΗ ΑΓΩΝΩΝ...
  </div>
</div>

<div class="betslip" id="betslip">
  <div class="betslip-header" onclick="toggleSlip()">
    <span class="betslip-title">Επιλογές μου</span>
    <span class="betslip-count" id="slipCount">0</span>
  </div>
  <div class="betslip-body" id="slipBody">
    <div class="betslip-empty">Κάνε κλικ σε πιθανότητα για να την προσθέσεις</div>
  </div>
  <div class="betslip-footer">
    <button class="clear-btn" onclick="clearSlip()">Καθαρισμός</button>
  </div>
</div>

<script>


const LEAGUES = {
  39:  { name: "Premier League", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
  140: { name: "La Liga",        flag: "🇪🇸" },
  135: { name: "Serie A",        flag: "🇮🇹" },
  78:  { name: "Bundesliga",     flag: "🇩🇪" },
  61:  { name: "Ligue 1",        flag: "🇫🇷" },
  2:   { name: "Champions League", flag: "🏆" },
  3:   { name: "Europa League",  flag: "🥈" },
  197: { name: "Super League",   flag: "🇬🇷" },
};

let allData = {};
let betslip = [];
let activeFilter = "all";
let slipOpen = true;

function today() {
  const d = new Date();
  return d.toISOString().split("T")[0];
}

function formatDate(str) {
  const d = new Date(str + "T00:00:00");
  return d.toLocaleDateString("el-GR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}

function toEEST(utcStr) {
  const d = new Date(utcStr);
  return d.toLocaleTimeString("el-GR", { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Athens" });
}

async function apiFetch(path) {
  const res = await fetch(`/.netlify/functions/api?path=${encodeURIComponent(path)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchFixtures(date) {
  const json = await apiFetch(`/v3/fixtures?date=${date}&timezone=Europe/Athens`);
  return json.response || [];
}

async function fetchOdds(fixtureId) {
  try {
    const json = await apiFetch(`/v3/odds?fixture=${fixtureId}&bet=1`);
    return json.response?.[0] || null;
  } catch(e) { return null; }
}

function getWinProb(oddsArr) {
  if (!oddsArr || !oddsArr.length) return null;
  const bookmaker = oddsArr[0];
  const bet = bookmaker?.bets?.find(b => b.name === "Match Winner" || b.id === 1);
  if (!bet) return null;
  const vals = bet.values;
  const toProb = (o) => 1 / parseFloat(o);
  const raw = vals.map(v => toProb(v.odd));
  const sum = raw.reduce((a, b) => a + b, 0);
  const norm = raw.map(r => (r / sum * 100).toFixed(1));
  return { home: parseFloat(norm[0]), draw: parseFloat(norm[1]), away: parseFloat(norm[2]) };
}

function buildFilters(data) {
  const filtersEl = document.getElementById("filters");
  filtersEl.innerHTML = '<button class="pill active" onclick="filterLeague(\'all\', this)">Όλα</button>';
  Object.keys(data).forEach(lid => {
    const l = LEAGUES[lid] || { name: lid, flag: "⚽" };
    const btn = document.createElement("button");
    btn.className = "pill";
    btn.textContent = `${l.flag} ${l.name}`;
    btn.onclick = function() { filterLeague(lid, this); };
    filtersEl.appendChild(btn);
  });
}

function renderAll() {
  const main = document.getElementById("main");
  const toShow = activeFilter === "all" ? allData : { [activeFilter]: allData[activeFilter] };

  let html = "";
  let total = 0;
  for (const [lid, matches] of Object.entries(toShow)) {
    if (!matches || !matches.length) continue;
    total += matches.length;
    const l = LEAGUES[lid] || { name: lid, flag: "⚽" };
    html += `<div class="league-block">
      <div class="league-title">
        <span class="league-flag">${l.flag}</span>
        <span class="league-name">${l.name}</span>
        <span class="league-count">${matches.length} αγώνες</span>
      </div>`;
    matches.forEach(m => { html += renderMatch(m); });
    html += `</div>`;
  }

  if (!total) {
    html = `<div class="empty-state">Δεν βρέθηκαν αγώνες για σήμερα.</div>`;
  }
  main.innerHTML = html;
}

function renderMatch(m) {
  const isLive = m.fixture.status.short === "1H" || m.fixture.status.short === "2H" || m.fixture.status.short === "HT";
  const finished = m.fixture.status.short === "FT";
  const probs = m._probs;
  const fid = m.fixture.id;

  let topIdx = -1;
  if (probs) {
    const arr = [probs.home, probs.draw, probs.away];
    topIdx = arr.indexOf(Math.max(...arr));
  }

  const labels = ["1", "X", "2"];
  const teamLabels = [m.teams.home.name, "Ισοπαλία", m.teams.away.name];
  const probVals = probs ? [probs.home, probs.draw, probs.away] : [];

  const oddsHtml = probs ? `
    <div class="odds">
      ${probVals.map((p, i) => {
        const id = `${fid}-${i}`;
        const isSel = betslip.some(b => b.id === id);
        const isBest = i === topIdx && !isSel;
        return `<div class="odd ${isBest ? 'best' : ''} ${isSel ? 'selected' : ''}"
          onclick="toggleBet('${id}', '${m.teams.home.name} vs ${m.teams.away.name}', '${teamLabels[i]}', ${p})">
          <span class="odd-label">${labels[i]} · ${teamLabels[i].split(" ")[0]}</span>
          <span class="odd-val">${p.toFixed(1)}%</span>
        </div>`;
      }).join("")}
    </div>` : `<div class="no-odds">Δεν υπάρχουν διαθέσιμες αποδόσεις</div>`;

  const scoreOrVs = isLive || finished
    ? `<span class="score-or-vs">${m.goals.home ?? 0} - ${m.goals.away ?? 0}</span>`
    : `<span class="score-or-vs vs">vs</span>`;

  const isTopPick = topIdx !== -1 && probVals[topIdx] >= 60;

  return `<div class="match ${isLive ? 'live' : ''} ${isTopPick ? 'top-pick' : ''}">
    <div class="match-header">
      <span class="match-time">${toEEST(m.fixture.date)}</span>
      ${isLive ? `<span class="live-dot">LIVE ${m.fixture.status.elapsed}'</span>` : ''}
      ${finished ? `<span style="font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;">ΤΕΛΙΚΟ</span>` : ''}
    </div>
    <div class="match-teams">
      <span class="team-name">${m.teams.home.name}</span>
      ${scoreOrVs}
      <span class="team-name away">${m.teams.away.name}</span>
    </div>
    ${oddsHtml}
  </div>`;
}

function filterLeague(id, el) {
  activeFilter = id;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  renderAll();
}

function toggleBet(id, match, pick, pct) {
  const idx = betslip.findIndex(b => b.id === id);
  if (idx > -1) betslip.splice(idx, 1);
  else betslip.push({ id, match, pick, pct });
  renderAll();
  renderSlip();
}

function clearSlip() {
  betslip = [];
  renderAll();
  renderSlip();
}

function toggleSlip() {
  const body = document.getElementById("slipBody");
  const footer = document.querySelector(".betslip-footer");
  slipOpen = !slipOpen;
  body.style.display = slipOpen ? "block" : "none";
  footer.style.display = slipOpen ? "flex" : "none";
}

function renderSlip() {
  document.getElementById("slipCount").textContent = betslip.length;
  const body = document.getElementById("slipBody");
  if (!betslip.length) {
    body.innerHTML = '<div class="betslip-empty">Κάνε κλικ σε πιθανότητα για να την προσθέσεις</div>';
    return;
  }
  body.innerHTML = betslip.map(b => `
    <div class="slip-item">
      <span class="slip-pct">${b.pct.toFixed(1)}%</span>
      <div class="slip-match">${b.match}</div>
      <div class="slip-pick">${b.pick}</div>
    </div>`).join("");
}

async function init() {
  const date = today();
  document.getElementById("dateBadge").textContent = formatDate(date);

  try {
    const fixtures = await fetchFixtures(date);
    const relevant = fixtures;

    if (!relevant.length) {
      document.getElementById("main").innerHTML = `<div class="empty-state">Δεν βρέθηκαν αγώνες για σήμερα στα επιλεγμένα πρωταθλήματα.</div>`;
      return;
    }

    // Group by league
    relevant.forEach(f => {
      const lid = f.league.id;
      if (!allData[lid]) allData[lid] = [];
      allData[lid].push(f);
    });

    // Sort each league by time
    for (const lid in allData) {
      allData[lid].sort((a, b) => new Date(a.fixture.date) - new Date(b.fixture.date));
    }

    buildFilters(allData);
    renderAll();

    // Fetch odds in background
    for (const lid in allData) {
      for (const m of allData[lid]) {
        try {
          const oddsData = await fetchOdds(m.fixture.id);
          if (oddsData) {
            m._probs = getWinProb(oddsData.bookmakers);
          }
        } catch(e) { /* skip */ }
      }
    }
    renderAll();

  } catch(err) {
    document.getElementById("main").innerHTML = `
      <div class="error">
        <strong>Σφάλμα σύνδεσης με το API</strong><br><br>
        ${err.message}<br><br>
        Βεβαιώσου ότι το API key είναι έγκυρο και ότι έχεις πρόσβαση στο internet.
      </div>`;
  }
}

init();
</script>
</body>
</html>
